<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>晚秋记账</title>
  <link rel="stylesheet" href="style.css">
  <!-- Chart.js 图表库，用于绘制饼图 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- ========== 侧边栏 ========== -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1 class="app-title">🍂 晚秋记账</h1>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-btn active" data-page="add-record">
          <span class="nav-icon">✏️</span>
          <span>记一笔</span>
        </button>
        <button class="nav-btn" data-page="records-list">
          <span class="nav-icon">📋</span>
          <span>账单列表</span>
        </button>
        <button class="nav-btn" data-page="statistics">
          <span class="nav-icon">📊</span>
          <span>月度统计</span>
        </button>
        <button class="nav-btn" data-page="categories">
          <span class="nav-icon">🏷️</span>
          <span>分类管理</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="month-summary" id="sidebar-summary">
          <div class="summary-label">本月支出</div>
          <div class="summary-amount" id="sidebar-expense">¥ 0.00</div>
        </div>
      </div>
    </aside>

    <!-- ========== 主内容区 ========== -->
    <main id="main-content">
      <!-- 页面1：记一笔 -->
      <section id="page-add-record" class="page active">
        <h2>✏️ 记一笔</h2>
        <form id="record-form" class="record-form">
          <div class="form-row">
            <div class="form-group">
              <label for="record-type">类型</label>
              <select id="record-type" class="form-input">
                <option value="expense">支出</option>
                <option value="income">收入</option>
              </select>
            </div>
            <div class="form-group">
              <label for="record-amount">金额（元）</label>
              <input type="number" id="record-amount" class="form-input" placeholder="0.00" step="0.01" min="0.01" required>
            </div>
            <div class="form-group">
              <label for="record-date">日期</label>
              <input type="date" id="record-date" class="form-input" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="record-category">分类</label>
              <select id="record-category" class="form-input" required>
                <option value="">请选择分类</option>
              </select>
            </div>
            <div class="form-group">
              <label for="record-note">备注（可选）</label>
              <input type="text" id="record-note" class="form-input" placeholder="例如：和同事AA制">
            </div>
          </div>

          <button type="submit" class="btn btn-primary">✅ 保存记录</button>
        </form>
      </section>

      <!-- 页面2：账单列表 -->
      <section id="page-records-list" class="page">
        <div class="page-header">
          <h2>📋 账单列表</h2>
          <div class="filter-bar">
            <input type="month" id="filter-month" class="form-input">
            <button id="btn-clear-filter" class="btn btn-outline">清除筛选</button>
          </div>
        </div>
        <div class="records-table-wrap">
          <table id="records-table" class="records-table">
            <thead>
              <tr>
                <th>日期</th>
                <th>类型</th>
                <th>分类</th>
                <th>金额</th>
                <th>备注</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="records-tbody">
              <tr class="empty-row">
                <td colspan="6">暂无记录，去"记一笔"添加吧</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- 页面3：月度统计 -->
      <section id="page-statistics" class="page">
        <h2>📊 月度统计</h2>
        <div class="stats-controls">
          <input type="month" id="stats-month" class="form-input">
        </div>
        <div class="stats-summary">
          <div class="stats-card expense-card">
            <div class="stats-label">总支出</div>
            <div class="stats-value" id="stats-expense-total">¥ 0.00</div>
          </div>
          <div class="stats-card income-card">
            <div class="stats-label">总收入</div>
            <div class="stats-value" id="stats-income-total">¥ 0.00</div>
          </div>
          <div class="stats-card balance-card">
            <div class="stats-label">结余</div>
            <div class="stats-value" id="stats-balance">¥ 0.00</div>
          </div>
        </div>
        <div class="chart-container">
          <canvas id="pie-chart"></canvas>
        </div>
        <div id="no-data-hint" class="no-data-hint" style="display:none;">
          暂无数据，去"记一笔"添加记录吧
        </div>
      </section>

      <!-- 页面4：分类管理 -->
      <section id="page-categories" class="page">
        <h2>🏷️ 分类管理</h2>
        <div class="add-category-form">
          <input type="text" id="new-category-name" class="form-input" placeholder="分类名称，如：宠物">
          <input type="text" id="new-category-icon" class="form-input icon-input" placeholder="图标，如：🐱" maxlength="2">
          <button id="btn-add-category" class="btn btn-primary">➕ 添加分类</button>
        </div>
        <div class="categories-grid" id="categories-grid">
          <!-- 动态生成 -->
        </div>
      </section>
    </main>
  </div>

  <!-- ========== 编辑弹窗 ========== -->
  <div id="edit-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>✏️ 编辑记录</h3>
      <form id="edit-form">
        <input type="hidden" id="edit-id">
        <div class="form-group">
          <label>类型</label>
          <select id="edit-type" class="form-input">
            <option value="expense">支出</option>
            <option value="income">收入</option>
          </select>
        </div>
        <div class="form-group">
          <label>金额（元）</label>
          <input type="number" id="edit-amount" class="form-input" step="0.01" min="0.01" required>
        </div>
        <div class="form-group">
          <label>分类</label>
          <select id="edit-category" class="form-input" required></select>
        </div>
        <div class="form-group">
          <label>日期</label>
          <input type="date" id="edit-date" class="form-input" required>
        </div>
        <div class="form-group">
          <label>备注</label>
          <input type="text" id="edit-note" class="form-input" placeholder="备注（可选）">
        </div>
        <div class="modal-buttons">
          <button type="submit" class="btn btn-primary">💾 保存修改</button>
          <button type="button" class="btn btn-outline" id="btn-close-modal">取消</button>
        </div>
      </form>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
